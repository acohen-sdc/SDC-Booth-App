<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>SDC Kiosk — Automate 2026</title>
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800&display=swap" rel="stylesheet" />

<style>
/* =================================================================
   SDC Kiosk — Automate 2026
   Brand: Steven Douglas Corp. (sdcautomation.com)
   Colors: Primary Blue #1574C4 · Dark Navy #061D39 · Accent Green #74C415
   ================================================================= */

:root {
  --blue: #1574C4;
  --blue-2: #5BA0E0;
  --blue-light: #AACEE8;
  --navy: #061D39;
  --navy-2: #0a2547;
  --yellow: #74C415;   /* accent color changed to green per design notes */
  --green: #74C415;
  --gray: #D9D9D9;
  --black: #231F20;
  --bg: #0a0e14;
  --panel: #14181f;
  --panel-2: #1a1f28;
  --panel-3: #1f2530;
  --border: #2a3140;
  --border-2: #353d4d;
  --text: #ffffff;
  --text-dim: #a8b1c0;
  --text-mute: #6c7689;
}

* { box-sizing: border-box; }
html, body {
  margin: 0; padding: 0;
  background: #0a0e14; /* match app bg so letterbox bars are invisible */
  color: var(--text);
  font-family: "Montserrat", system-ui, -apple-system, sans-serif;
  font-weight: 500;
  -webkit-font-smoothing: antialiased;
  overflow: hidden;
  height: 100vh;
}
button { font-family: inherit; cursor: pointer; }

/* Touch to Explore neon flicker */
.touch-text {
  font-size: 36px; font-weight: 800;
  color: var(--green);
  letter-spacing: 0.04em; text-transform: uppercase;
  line-height: 1.1; text-align: right;
  text-shadow:
    0 0 8px #74C415,
    0 0 20px #74C415,
    0 0 40px #74C415,
    0 0 80px rgba(116,196,21,0.5);
  animation: neonFlicker 4s infinite;
}
@keyframes neonFlicker {
  0%,  18%, 20%, 50%, 52%, 64%, 66%, 100% {
    text-shadow:
      0 0 8px #74C415,
      0 0 20px #74C415,
      0 0 40px #74C415,
      0 0 80px rgba(116,196,21,0.5);
    opacity: 1;
  }
  19%, 51%, 65% {
    text-shadow: none;
    opacity: 0.6;
  }
}

/* Who we work with label */
.logo-bar-label {
  background: var(--panel-2);
  padding: 12px 28px 8px;
  font-size: 11px; font-weight: 700;
  color: var(--text-mute);
  letter-spacing: 0.16em; text-transform: uppercase;
  border-bottom: 1px solid var(--border);
}

/* Stage */
#root { position: fixed; inset: 0; }
.stage {
  position: absolute;
  top: 50%; left: 50%;
  width: 1920px; height: 1080px;
  transform: translate(calc(-50% + var(--offset-x, 0) * 1px), calc(-50% + var(--offset-y, 0) * 1px)) scale(var(--scale, 1));
  transform-origin: center;
  background: var(--bg);
  overflow: hidden;
}

/* Frame */
.frame {
  position: absolute; inset: 0;
  background: var(--bg);
  display: flex; flex-direction: column;
  padding: 0 32px 0;
  gap: 0;
}
.kheader { margin-top: 20px; }
.frame-body {
  flex: 1; min-height: 0;
  background: var(--panel);
  border: 1px solid var(--border);
  border-radius: 0 0 14px 14px;
  border-top: none;
  overflow-y: auto;
  scrollbar-width: thin;
  scrollbar-color: var(--border-2) transparent;
}
.frame-body::-webkit-scrollbar { width: 6px; }
.frame-body::-webkit-scrollbar-thumb { background: var(--border-2); border-radius: 3px; }

/* Header */
.kheader {
  display: flex; align-items: center; justify-content: space-between;
  background: var(--navy);
  border: 1px solid var(--border);
  border-bottom: none;
  border-radius: 14px 14px 0 0;
  padding: 14px 32px;
  height: 120px;
  flex: 0 0 auto;
}
.kheader-left { display: flex; align-items: center; gap: 20px; }
.kheader-right { display: flex; align-items: center; gap: 24px; }

.sdc-logo { height: 87px; width: auto; object-fit: contain; }
.logo-block { display: flex; flex-direction: column; align-items: flex-start; gap: 2px; }
.header-divider {
  width: 1px; height: 40px; background: var(--border-2);
  margin: 0 4px;
}

.back-btn {
  display: inline-flex; align-items: center; gap: 10px;
  background: var(--panel-2);
  border: 1px solid var(--border-2);
  color: var(--blue-2);
  border-radius: 8px;
  padding: 8px 16px 8px 12px;
  font-size: 15px; font-weight: 700;
  transition: background 0.15s, border-color 0.15s;
}
.back-btn:hover { background: var(--panel-3); border-color: var(--blue); color: #fff; }

.show-badge {
  color: var(--text-mute);
  font-size: 13px; font-weight: 600;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  border-left: 1px solid var(--border-2);
  padding-left: 20px;
}
.show-badge span { color: var(--yellow); }

.dots { display: flex; align-items: center; gap: 10px; }
.dot {
  width: 12px; height: 12px; border-radius: 50%;
  background: rgba(255,255,255,0.18);
  cursor: pointer;
  transition: transform 0.15s ease, background 0.2s ease;
}
.dot:hover { background: rgba(255,255,255,0.4); }
.dot-active { background: var(--green); transform: scale(1.15); }

/* Hero */
.hero {
  background: linear-gradient(135deg, var(--blue) 0%, #0d5fa3 100%);
  padding: 40px 52px 44px;
  position: relative;
  overflow: hidden;
  display: flex; align-items: center; justify-content: space-between;
}
.hero::before {
  content: "";
  position: absolute; inset: 0;
  background: radial-gradient(ellipse at 80% 50%, rgba(255,255,255,0.06) 0%, transparent 60%);
}
.hero-left { position: relative; z-index: 1; }
.hero-title {
  font-size: 54px; font-weight: 800;
  letter-spacing: -0.02em;
  margin: 0; color: #fff;
  line-height: 1.05;
}
.hero-sub {
  margin: 10px 0 0; color: rgba(255,255,255,0.88);
  font-size: 22px; font-weight: 500;
}
.hero-sub em { color: var(--yellow); font-style: normal; font-weight: 700; }
.hero-right { position: relative; z-index: 1; flex-shrink: 0; }

/* Screen content */
.screen-content { padding: 24px 44px 32px; }
.frame-body > .hero + .screen-content { padding-top: 0; }

/* Section banner */
.section-banner {
  display: flex; align-items: flex-end; justify-content: space-between;
  padding: 4px 0 22px;
  border-bottom: 1px solid var(--border);
  margin-bottom: 24px;
  gap: 24px;
}
.section-kicker {
  font-size: 12px; color: var(--blue-2); font-weight: 700;
  letter-spacing: 0.16em; text-transform: uppercase;
  margin-bottom: 6px;
}
.section-title {
  margin: 0; font-size: 42px; font-weight: 800;
  letter-spacing: -0.02em; color: #fff;
}
.banner-meta { color: var(--text-dim); font-weight: 600; font-size: 16px; white-space: nowrap; }

/* Home grid */
.home-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 14px;
  padding: 14px 0 0;
}
.home-card {
  background: var(--panel-2);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 26px 28px 24px;
  display: flex; flex-direction: column;
  text-align: left; color: #fff;
  min-height: 200px;
  transition: transform 0.12s ease, background 0.15s ease, border-color 0.15s ease;
}
.home-card:hover { background: var(--panel-3); border-color: var(--blue); transform: translateY(-2px); }
.home-card-icon { margin-bottom: 16px; }
.home-card-icon img { width: 68px; height: 68px; object-fit: contain; }
.home-card-title { font-size: 26px; font-weight: 700; margin-bottom: 6px; }
.home-card-blurb { color: var(--text-dim); font-size: 16px; line-height: 1.4; flex: 1; }

/* Pills */
.pill {
  align-self: flex-start;
  display: inline-flex; align-items: center;
  padding: 7px 14px;
  border-radius: 999px;
  font-size: 13px; font-weight: 700;
  border: none;
}
.pill-primary { background: var(--blue); color: #fff; }
.pill-navy { background: var(--navy); color: var(--blue-2); border: 1px solid var(--blue); }
.pill-static { cursor: default; }

/* Customer logo bar */
.logo-bar-outer {
  margin-top: 20px;
  border-radius: 12px;
  overflow: hidden;
  border: 1px solid var(--border);
}
.logo-bar-wrap {
  background: var(--panel-2);
  overflow: hidden;
  height: 72px;
  display: flex; align-items: center;
}
.logo-bar-track {
  display: flex; align-items: center; gap: 72px;
  animation: scrollLogosLTR 80s linear infinite;
  white-space: nowrap;
  padding: 0 36px;
}
.logo-bar-track:hover { animation-play-state: paused; }
@keyframes scrollLogosLTR {
  0%   { transform: translateX(-50%); }
  100% { transform: translateX(0); }
}
.logo-bar-item {
  flex: 0 0 auto;
  height: 44px;
  display: flex; align-items: center;
}
.logo-bar-item img {
  height: 38px; width: auto;
  max-width: 130px;
  object-fit: contain;
  filter: brightness(0) invert(1);
  opacity: 0.5;
  transition: opacity 0.2s;
}
.logo-bar-item img:hover { opacity: 0.85; }

/* Tile grid */
.tile-grid { display: grid; gap: 14px; }
.tile-grid-4 { grid-template-columns: repeat(4, 1fr); }
.tile-grid-3 { grid-template-columns: repeat(3, 1fr); }
.tile-card {
  background: var(--panel-2);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 28px 18px 22px;
  display: flex; flex-direction: column; align-items: center;
  gap: 10px; color: #fff;
  min-height: 160px;
  transition: transform 0.12s ease, background 0.15s ease, border-color 0.15s ease;
}
.tile-card:hover { background: var(--panel-3); border-color: var(--blue); transform: translateY(-2px); }
.tile-card img { width: 56px; height: 56px; object-fit: contain; }
.tile-label { font-size: 19px; font-weight: 700; text-align: center; }
.tile-desc { color: var(--text-dim); font-size: 13px; text-align: center; line-height: 1.4; margin-top: 2px; }

/* App tile */
.app-tile {
  background: var(--panel-2);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 22px 20px;
  display: flex; flex-direction: column;
  text-align: left; color: #fff;
  transition: transform 0.12s ease, background 0.15s ease, border-color 0.15s ease;
  min-height: 200px;
}
.app-tile:hover { background: var(--panel-3); border-color: var(--blue); transform: translateY(-2px); }
.app-tile img { width: 48px; height: 48px; object-fit: contain; margin-bottom: 12px; }
.app-tile-name { font-size: 18px; font-weight: 700; margin-bottom: 6px; }
.app-tile-desc { color: var(--text-dim); font-size: 13px; line-height: 1.4; flex: 1; }
.app-tile-rate {
  margin-top: 12px; align-self: flex-start;
  background: var(--navy); color: var(--blue-2);
  border: 1px solid var(--blue);
  padding: 5px 10px; border-radius: 999px;
  font-size: 11px; font-weight: 700;
}

/* Case study filter bar */
.case-filter { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 14px; }

/* Notice */
.notice {
  margin-top: 20px;
  background: rgba(116,196,21,0.15); color: #fff;
  border: 1px solid rgba(116,196,21,0.4);
  border-radius: 10px; padding: 14px 18px;
  display: flex; align-items: center; gap: 12px;
  font-size: 15px; font-weight: 600;
}

/* Case list (kept for industry detail) */
.case-list { display: flex; flex-direction: column; gap: 10px; }
.case-row {
  display: flex; align-items: center; justify-content: space-between;
  background: var(--panel-2);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 14px 18px 14px 14px;
  text-align: left; color: #fff; gap: 18px;
  transition: background 0.15s ease, border-color 0.15s ease, transform 0.12s ease;
}
.case-row:hover { background: var(--panel-3); border-color: var(--blue); transform: translateX(2px); }
.case-row-left { flex: 1; min-width: 0; }
.case-row-meta { display: flex; gap: 8px; margin-bottom: 6px; flex-wrap: wrap; }
.case-row-title { font-size: 17px; font-weight: 700; margin-bottom: 3px; }
.case-row-blurb {
  color: var(--text-dim); font-size: 13px; line-height: 1.35;
  display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden;
}
.case-row-blurb-tight { -webkit-line-clamp: 1; }
.case-row-right { display: flex; flex-direction: column; align-items: flex-end; gap: 6px; flex-shrink: 0; min-width: 130px; }
.case-row-value { color: var(--blue-2); font-weight: 700; font-size: 15px; }

/* Case card grid */
.case-card-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 14px;
}
.case-card {
  background: var(--panel-2);
  border: 1px solid var(--border);
  border-radius: 12px;
  overflow: hidden;
  display: flex; flex-direction: column;
  text-align: left; color: #fff;
  transition: transform 0.12s ease, background 0.15s ease, border-color 0.15s ease;
}
.case-card:hover { background: var(--panel-3); border-color: var(--blue); transform: translateY(-2px); }
.case-card-img {
  width: 100%; height: 160px;
  object-fit: cover; display: block;
  background: var(--panel-3);
}
.case-card-img-placeholder {
  width: 100%; height: 160px;
  background: var(--panel-3);
  display: flex; align-items: center; justify-content: center;
}
.case-card-img-placeholder img { width: 40px; height: 40px; opacity: 0.2; }
.case-card-body { padding: 14px 16px 16px; display: flex; flex-direction: column; flex: 1; }
.case-card-meta { display: flex; gap: 6px; margin-bottom: 8px; flex-wrap: wrap; }
.case-card-title { font-size: 15px; font-weight: 700; margin-bottom: 5px; line-height: 1.25; }
.case-card-blurb {
  color: var(--text-dim); font-size: 12px; line-height: 1.4; flex: 1;
  display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden;
  margin-bottom: 10px;
}
.case-card-footer { display: flex; align-items: center; justify-content: space-between; margin-top: auto; }
.case-card-rate { color: var(--blue-2); font-weight: 700; font-size: 13px; }
.case-card-lead {
  color: var(--green); font-size: 11px; font-weight: 600;
  padding: 3px 8px; border-radius: 999px;
  background: rgba(116,196,21,0.1); border: 1px solid rgba(116,196,21,0.3);
}

/* Case study detail */
.detail-grid {
  display: grid; grid-template-columns: 1.4fr 1fr; gap: 32px;
}
.detail-meta { display: flex; gap: 8px; margin-bottom: 12px; flex-wrap: wrap; }
.detail-title { font-size: 38px; font-weight: 800; letter-spacing: -0.02em; margin: 0 0 12px; line-height: 1.1; }
.detail-blurb { font-size: 18px; font-weight: 500; color: var(--text-dim); line-height: 1.5; margin: 0 0 18px; }
.detail-badges { display: flex; gap: 10px; margin-bottom: 20px; flex-wrap: wrap; }
.badge { display: inline-block; padding: 8px 16px; border-radius: 999px; font-size: 14px; font-weight: 700; }
.badge-primary { background: var(--blue); color: #fff; }
.badge-navy { background: var(--navy); color: var(--blue-2); border: 1px solid var(--blue); }

/* Case image */
.case-image {
  width: 100%; border-radius: 10px;
  border: 1px solid var(--border);
  object-fit: cover;
  height: 420px;
  background: var(--panel-3);
}
.case-image-placeholder {
  width: 100%; height: 420px;
  border-radius: 10px;
  border: 1px dashed var(--border-2);
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  gap: 8px; color: var(--text-mute);
  font-size: 13px;
  background: var(--panel-3);
}

/* Tech tags */
.tech-tags { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 10px; }
.tech-tag {
  background: var(--panel-3); border: 1px solid var(--border-2);
  color: var(--text-dim); padding: 5px 10px;
  border-radius: 6px; font-size: 12px; font-weight: 600;
}

/* Highlights */
.highlights-card {
  background: var(--panel-3); border: 1px solid var(--border);
  border-radius: 12px; padding: 24px 26px;
}
.highlights-title { font-size: 18px; font-weight: 700; margin-bottom: 14px; }
.highlights-list { display: flex; flex-direction: column; gap: 12px; margin-bottom: 18px; }
.highlight-row {
  display: flex; align-items: flex-start; gap: 14px;
  padding-bottom: 12px; border-bottom: 1px solid var(--border);
}
.highlight-row:last-child { border-bottom: none; padding-bottom: 0; }
.highlight-text { font-size: 15px; line-height: 1.3; }
.highlight-value { font-weight: 700; color: #fff; }
.highlight-label { color: var(--text-dim); }

.watch-btn {
  width: 100%; background: var(--blue); color: #fff;
  border: none; border-radius: 10px;
  padding: 16px 20px; font-size: 18px; font-weight: 700;
  display: flex; align-items: center; justify-content: center; gap: 10px;
  transition: background 0.15s ease, transform 0.1s ease;
}
.watch-btn:hover { background: #1880D7; transform: translateY(-1px); }

/* Industry detail */
.industry-blurb {
  font-size: 20px; color: var(--text-dim); font-weight: 500;
  line-height: 1.45; max-width: 1100px; margin-bottom: 20px;
}
.industry-grid { display: grid; grid-template-columns: 1.2fr 1fr; gap: 28px; }
.ind-col-title {
  font-size: 12px; font-weight: 700; color: var(--blue-2);
  letter-spacing: 0.16em; text-transform: uppercase; margin-bottom: 12px;
}
.ind-video-list { display: flex; flex-direction: column; gap: 8px; }
.empty {
  background: var(--panel-2); border: 1px dashed var(--border-2);
  border-radius: 8px; padding: 18px; color: var(--text-dim); font-size: 14px;
}

/* Video library */
.offline-badge {
  display: inline-flex; align-items: center; gap: 8px;
  color: var(--yellow); font-weight: 700; font-size: 14px;
}
.offline-dot {
  width: 8px; height: 8px; border-radius: 50%;
  background: var(--yellow); box-shadow: 0 0 10px var(--yellow);
}
.video-filter { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 16px; }
.filter-chip {
  background: var(--panel-2); border: 1px solid var(--border);
  color: var(--text-dim); padding: 8px 16px;
  border-radius: 999px; font-size: 14px; font-weight: 600;
  transition: all 0.15s ease;
}
.filter-chip:hover { color: #fff; border-color: var(--blue); }
.filter-chip-active { background: var(--blue); color: #fff; border-color: var(--blue); }

.video-list { display: flex; flex-direction: column; gap: 8px; }
.video-row {
  display: flex; align-items: center; gap: 18px;
  background: var(--panel-2); border: 1px solid var(--border);
  border-radius: 10px; padding: 14px 20px;
  color: #fff; text-align: left;
  transition: background 0.15s ease, border-color 0.15s ease, transform 0.12s ease;
}
.video-row:hover { background: var(--panel-3); border-color: var(--blue); transform: translateX(2px); }
.video-play {
  width: 48px; height: 48px; border-radius: 50%;
  background: var(--blue);
  display: flex; align-items: center; justify-content: center; flex-shrink: 0;
}
.video-row-body { flex: 1; min-width: 0; }
.video-row-title { font-size: 17px; font-weight: 700; margin-bottom: 3px; }
.video-row-tags { color: var(--text-dim); font-size: 13px; }

/* Video detail / player */
.video-detail { display: grid; grid-template-columns: 1.6fr 1fr; gap: 28px; }
.video-stage {
  background: #000; border: 1px solid var(--border);
  border-radius: 12px; overflow: hidden;
  display: flex; flex-direction: column;
}
.video-stage video { width: 100%; display: block; background: #000; max-height: 480px; }
.video-stage-placeholder {
  aspect-ratio: 16/9;
  background: radial-gradient(ellipse at center, #1a2638 0%, #000 75%);
  display: flex; align-items: center; justify-content: center; flex-direction: column; gap: 12px;
  color: var(--text-mute); font-size: 14px;
}
.video-controls {
  background: #0d1117; padding: 12px 16px;
  display: flex; align-items: center; gap: 12px;
  border-top: 1px solid var(--border);
}
.video-ctrl-play {
  background: var(--blue); color: #fff;
  width: 38px; height: 38px; border-radius: 50%; border: none;
  font-size: 12px; display: flex; align-items: center; justify-content: center;
}
.video-progress {
  flex: 1; height: 8px; background: #1f2530; border-radius: 4px;
  cursor: pointer; position: relative; overflow: visible;
}
.video-progress:hover { height: 12px; }
.video-progress-fill { height: 100%; background: var(--blue); border-radius: 4px; transition: width 0.1s linear; }
.video-progress::after {
  content: ''; position: absolute; right: calc(100% - var(--prog, 0) * 100%);
  top: 50%; transform: translate(50%,-50%);
  width: 14px; height: 14px; border-radius: 50%;
  background: #fff; box-shadow: 0 0 4px rgba(0,0,0,.5);
  opacity: 0; transition: opacity 0.15s;
}
.video-progress:hover::after { opacity: 1; }
.video-ctrl-skip {
  background: transparent; color: var(--text-dim); border: none;
  font-size: 11px; font-weight: 700; display: flex; flex-direction: column;
  align-items: center; gap: 1px; cursor: pointer; padding: 4px;
  line-height: 1; min-width: 32px;
}
.video-ctrl-skip:hover { color: #fff; }
.video-ctrl-skip svg { width: 16px; height: 16px; }
.video-time { color: var(--text-dim); font-size: 13px; min-width: 90px; text-align: right; }

.video-side {
  background: var(--panel-2); border: 1px solid var(--border);
  border-radius: 12px; padding: 24px 26px;
  display: flex; flex-direction: column; gap: 12px;
}

<div class="stage" id="stage">
  <div id="root"></div>
</div>

<script>
(function() {
  const stage = document.getElementById("stage");
  const STORAGE_KEY = "sdc_kiosk_view";
  let locked = false;

  // ── Persist/restore settings via localStorage ──────────────────────────────
  function save() {
    try {
      localStorage.setItem(STORAGE_KEY, JSON.stringify({
        scale: parseFloat(stage.style.getPropertyValue("--scale") || 1),
        offsetX: parseFloat(stage.style.getPropertyValue("--offset-x") || 0),
        offsetY: parseFloat(stage.style.getPropertyValue("--offset-y") || 0),
        locked
      }));
    } catch(e) {}
  }

  function restore() {
    try {
      const d = JSON.parse(localStorage.getItem(STORAGE_KEY) || "{}");
      if (d.scale)   { stage.style.setProperty("--scale",    d.scale);   }
      if (d.offsetX) { stage.style.setProperty("--offset-x", d.offsetX); }
      if (d.offsetY) { stage.style.setProperty("--offset-y", d.offsetY); }
      if (d.locked)  { locked = true; enterFullscreen(); }
    } catch(e) {}
  }

  // ── Auto-fit (skipped when locked) ─────────────────────────────────────────
  function fit() {
    if (locked) return;
    const s = Math.min(window.innerWidth / 1920, window.innerHeight / 1080);
    stage.style.setProperty("--scale", s);
    stage.style.setProperty("--offset-x", 0);
    stage.style.setProperty("--offset-y", 0);
  }

  window.addEventListener("resize", fit);

  // ── Fullscreen helpers ──────────────────────────────────────────────────────
  function enterFullscreen() {
    const el = document.documentElement;
    if (el.requestFullscreen)            el.requestFullscreen();
    else if (el.webkitRequestFullscreen) el.webkitRequestFullscreen();
    else if (el.mozRequestFullScreen)    el.mozRequestFullScreen();
    else if (el.msRequestFullscreen)     el.msRequestFullscreen();
  }
  function exitFullscreen() {
    if (document.exitFullscreen)            document.exitFullscreen();
    else if (document.webkitExitFullscreen) document.webkitExitFullscreen();
    else if (document.mozCancelFullScreen)  document.mozCancelFullScreen();
    else if (document.msExitFullscreen)     document.msExitFullscreen();
  }

  // ── Global KioskZoom API ────────────────────────────────────────────────────
  window.KioskZoom = {
    // Zoom
    getScale:  () => parseFloat(stage.style.getPropertyValue("--scale") || 1),
    setScale:  (s) => { stage.style.setProperty("--scale", Math.min(3, Math.max(0.1, +s.toFixed(3)))); },
    zoomIn:    (step = 0.05) => { window.KioskZoom.setScale(window.KioskZoom.getScale() + step); },
    zoomOut:   (step = 0.05) => { window.KioskZoom.setScale(window.KioskZoom.getScale() - step); },
    // Position offset (px, applied before scale)
    getOffsetX: () => parseFloat(stage.style.getPropertyValue("--offset-x") || 0),
    getOffsetY: () => parseFloat(stage.style.getPropertyValue("--offset-y") || 0),
    setOffsetX: (v) => { stage.style.setProperty("--offset-x", Math.max(-500, Math.min(500, v))); },
    setOffsetY: (v) => { stage.style.setProperty("--offset-y", Math.max(-500, Math.min(500, v))); },
    nudgeX:    (d) => { window.KioskZoom.setOffsetX(window.KioskZoom.getOffsetX() + d); },
    nudgeY:    (d) => { window.KioskZoom.setOffsetY(window.KioskZoom.getOffsetY() + d); },
    // Lock / unlock
    isLocked: () => locked,
    lock:   () => { locked = true;  save(); enterFullscreen(); },
    unlock: () => { locked = false; save(); exitFullscreen(); fit(); },
    // Reset everything
    reset:  () => { locked = false; exitFullscreen(); fit(); save(); },
    // Persist current state
    save,
  };

  // Restore saved state on load, then auto-fit if not locked
  restore();
  if (!locked) fit();
})();
</script>

// ─── STAFF MENU (hidden: tap logo 5× rapidly) ────────────────────────────────
const useStaffMenu = () => {
  const taps = useRef([]);
  const [showMenu, setShowMenu] = useState(false);
  const TAP_COUNT = 5;
  const TAP_WINDOW = 3000;

  const handleLogoTap = useCallback(() => {
    const now = Date.now();
    taps.current = [...taps.current.filter(t => now - t < TAP_WINDOW), now];
    if (taps.current.length >= TAP_COUNT) {
      taps.current = [];
      setShowMenu(true);
    }
  }, []);

  return { showMenu, setShowMenu, handleLogoTap };
};

const StaffMenuOverlay = ({ onCancel }) => {
  const [scale,   setScale]   = useState(() => window.KioskZoom.getScale());
  const [offsetX, setOffsetX] = useState(() => window.KioskZoom.getOffsetX());
  const [offsetY, setOffsetY] = useState(() => window.KioskZoom.getOffsetY());
  const [isLocked, setIsLocked] = useState(() => window.KioskZoom.isLocked());

  const refresh = () => {
    setScale(window.KioskZoom.getScale());
    setOffsetX(window.KioskZoom.getOffsetX());
    setOffsetY(window.KioskZoom.getOffsetY());
  };

  const zoomBy   = (d) => { window.KioskZoom.zoomIn(d); refresh(); };
  const nudgeX   = (d) => { window.KioskZoom.nudgeX(d); refresh(); };
  const nudgeY   = (d) => { window.KioskZoom.nudgeY(d); refresh(); };
  const setPreset= (s) => { window.KioskZoom.setScale(s); refresh(); };

  const toggleLock = () => {
    if (isLocked) { window.KioskZoom.unlock(); setIsLocked(false); }
    else          { window.KioskZoom.lock();   setIsLocked(true);  }
    refresh();
  };
  const reset = () => { window.KioskZoom.reset(); setIsLocked(false); refresh(); };

  const b  = { border:"none", borderRadius:8, fontWeight:700, cursor:"pointer", fontFamily:"inherit" };
  const bLg = { ...b, fontSize:20, padding:"12px 20px" };
  const bSm = { ...b, fontSize:13, padding:"8px 14px" };
  const panel = { background:"var(--panel-2)", border:"1px solid var(--border)", borderRadius:12, padding:"16px 22px", display:"flex", flexDirection:"column", alignItems:"center", gap:12 };
  const label = { fontSize:11, fontWeight:700, color:"var(--blue-2)", letterSpacing:"0.14em", textTransform:"uppercase", marginBottom:2 };

  const PRESETS = [
    { label:"75%",  val:0.75 },
    { label:"85%",  val:0.85 },
    { label:"90%",  val:0.90 },
    { label:"95%",  val:0.95 },
    { label:"100%", val:1.00 },
    { label:"110%", val:1.10 },
  ];

  return (
    <div style={{
      position:"fixed", inset:0, zIndex:9999,
      background:"rgba(0,0,0,0.9)",
      display:"flex", flexDirection:"column",
      alignItems:"center", justifyContent:"center", gap:14,
      overflowY:"auto", padding:"20px 0"
    }}>
      <div style={{fontSize:20, fontWeight:800, color:"#fff", letterSpacing:"0.1em", textTransform:"uppercase"}}>Staff Menu</div>

      <div style={{display:"flex", gap:14, flexWrap:"wrap", justifyContent:"center", maxWidth:900}}>

        {/* ── ZOOM ── */}
        <div style={panel}>
          <div style={label}>Zoom</div>
          <div style={{fontSize:32, fontWeight:800, color:"#fff", lineHeight:1}}>{Math.round(scale * 100)}%</div>
          {/* Coarse: 5% */}
          <div style={{display:"flex", gap:8, alignItems:"center"}}>
            <button onClick={() => zoomBy(-0.05)} style={{...bLg, background:"var(--panel-3)", color:"#fff"}}>−5%</button>
            <button onClick={() => zoomBy( 0.05)} style={{...bLg, background:"var(--panel-3)", color:"#fff"}}>+5%</button>
          </div>
          {/* Fine: 1% */}
          <div style={{display:"flex", gap:8, alignItems:"center"}}>
            <button onClick={() => zoomBy(-0.01)} style={{...bSm, background:"var(--panel-3)", color:"var(--text-dim)"}}>−1%</button>
            <span style={{fontSize:12, color:"var(--text-mute)"}}>fine</span>
            <button onClick={() => zoomBy( 0.01)} style={{...bSm, background:"var(--panel-3)", color:"var(--text-dim)"}}>+1%</button>
          </div>
          {/* Presets */}
          <div style={{display:"flex", gap:6, flexWrap:"wrap", justifyContent:"center"}}>
            {PRESETS.map(p => (
              <button key={p.label} onClick={() => setPreset(p.val)} style={{
                ...bSm,
                background: Math.round(scale*100) === Math.round(p.val*100) ? "var(--blue)" : "var(--panel-3)",
                color: Math.round(scale*100) === Math.round(p.val*100) ? "#fff" : "var(--text-dim)"
              }}>{p.label}</button>
            ))}
          </div>
        </div>

        {/* ── POSITION ── */}
        <div style={panel}>
          <div style={label}>Position Offset</div>
          <div style={{fontSize:14, color:"var(--text-dim)", fontWeight:600}}>
            X: {Math.round(offsetX)}px &nbsp;·&nbsp; Y: {Math.round(offsetY)}px
          </div>
          {/* Y axis */}
          <button onClick={() => nudgeY(-10)} style={{...bLg, background:"var(--panel-3)", color:"#fff"}}>▲</button>
          <div style={{display:"flex", gap:8}}>
            <button onClick={() => nudgeX(-10)} style={{...bLg, background:"var(--panel-3)", color:"#fff"}}>◀</button>
            <button onClick={() => { window.KioskZoom.setOffsetX(0); window.KioskZoom.setOffsetY(0); refresh(); }}
              style={{...bSm, background:"var(--panel-3)", color:"var(--text-mute)", padding:"12px 16px"}}>○</button>
            <button onClick={() => nudgeX( 10)} style={{...bLg, background:"var(--panel-3)", color:"#fff"}}>▶</button>
          </div>
          <button onClick={() => nudgeY( 10)} style={{...bLg, background:"var(--panel-3)", color:"#fff"}}>▼</button>
          {/* Fine nudge */}
          <div style={{display:"flex", gap:6, marginTop:2}}>
            <button onClick={() => nudgeX(-2)} style={{...bSm, background:"var(--panel-3)", color:"var(--text-dim)"}}>◀1</button>
            <button onClick={() => nudgeY(-2)} style={{...bSm, background:"var(--panel-3)", color:"var(--text-dim)"}}>▲1</button>
            <button onClick={() => nudgeY( 2)} style={{...bSm, background:"var(--panel-3)", color:"var(--text-dim)"}}>▼1</button>
            <button onClick={() => nudgeX( 2)} style={{...bSm, background:"var(--panel-3)", color:"var(--text-dim)"}}>▶1</button>
          </div>
          <div style={{fontSize:11, color:"var(--text-mute)"}}>Arrow = 10px · numbered = 2px</div>
        </div>

      </div>

      {/* ── Lock / Reset / Exit ── */}
      <div style={{display:"flex", gap:12, flexWrap:"wrap", justifyContent:"center", marginTop:4}}>
        <button onClick={toggleLock} style={{
          ...b, fontSize:16, padding:"14px 28px",
          background: isLocked ? "#74C415" : "#1574C4", color:"#fff"
        }}>
          {isLocked ? "🔓 Unlock Position & Zoom" : "🔒 Lock Position & Zoom"}
        </button>
        <button onClick={reset} style={{...b, fontSize:16, padding:"14px 24px", background:"var(--panel-3)", color:"var(--text-dim)"}}>
          Reset All
        </button>
        <button onClick={() => window.close()} style={{...b, fontSize:16, padding:"14px 24px", background:"#c0392b", color:"#fff"}}>
          ✕ Exit Kiosk
        </button>
        <button onClick={onCancel} style={{...b, fontSize:16, padding:"14px 24px", background:"var(--panel-2)", color:"var(--text-dim)", border:"1px solid var(--border-2)"}}>
          Cancel
        </button>
      </div>

      {isLocked && (
        <div style={{fontSize:13, color:"#74C415", fontWeight:700}}>
          ✓ Locked at {Math.round(scale*100)}% · X:{Math.round(offsetX)}px Y:{Math.round(offsetY)}px — saved automatically
        </div>
      )}
      <div style={{fontSize:12, color:"var(--text-mute)"}}>Tap logo 5× to show this menu</div>
    </div>
  );
};

// ─── VIDEO DETAIL ────────────────────────────────────────────────────────────
const VideoDetail = ({ id, onNavigate }) => {
  const D = window.SDC_DATA;
  const v = D.videos.find(x => x.id === id);
  if (!v) return null;
  const c = v.caseId ? D.caseStudies.find(x => x.id === v.caseId) : null;
  const videoRef = useRef(null);
  const [playing, setPlaying] = useState(false);
  const [progress, setProgress] = useState(0);
  const [currentTime, setCurrentTime] = useState("0:00");
  const [duration, setDuration] = useState("—");
  const [hasVideo, setHasVideo] = useState(true);

  useEffect(() => {
    const el = videoRef.current;
    if (!el) return;
    const onTime = () => {
      if (el.duration) {
        setProgress(el.currentTime / el.duration);
        const m = Math.floor(el.currentTime / 60);
        const s = String(Math.floor(el.currentTime % 60)).padStart(2,"0");
        setCurrentTime(`${m}:${s}`);
      }
    };
    const onMeta = () => {
      const m = Math.floor(el.duration / 60);
      const s = String(Math.floor(el.duration % 60)).padStart(2,"0");
      setDuration(`${m}:${s}`);
    };
    el.addEventListener("timeupdate", onTime);
    el.addEventListener("loadedmetadata", onMeta);
    el.addEventListener("play", () => setPlaying(true));
    el.addEventListener("pause", () => setPlaying(false));
    return () => { el.removeEventListener("timeupdate", onTime); el.removeEventListener("loadedmetadata", onMeta); };
  }, [v.id]);

  const togglePlay = () => {
    const el = videoRef.current;
    if (!el) return;
    playing ? el.pause() : el.play();
  };

  const skip = (secs) => {
    const el = videoRef.current;
    if (!el || !el.duration) return;
    el.currentTime = Math.max(0, Math.min(el.duration, el.currentTime + secs));
  };

  const seekFromEvent = (e) => {
    const el = videoRef.current;
    if (!el || !el.duration) return;
    const rect = e.currentTarget.getBoundingClientRect();
    const ratio = Math.max(0, Math.min(1, (e.clientX - rect.left) / rect.width));
    el.currentTime = ratio * el.duration;
  };

  const handleSeekDrag = (e) => {
    e.preventDefault();
    const bar = e.currentTarget;
    const doSeek = (ev) => {
      const rect = bar.getBoundingClientRect();
      const ratio = Math.max(0, Math.min(1, (ev.clientX - rect.left) / rect.width));
      videoRef.current.currentTime = ratio * (videoRef.current.duration || 0);
    };
    doSeek(e);
    const onMove = (ev) => doSeek(ev);
    const onUp = () => { window.removeEventListener("mousemove", onMove); window.removeEventListener("mouseup", onUp); };
    window.addEventListener("mousemove", onMove);
    window.addEventListener("mouseup", onUp);
  };

  return (
    <div className="video-detail">
      <div className="video-stage">
        {hasVideo ? (
          <video ref={videoRef} src={VID_PATH(v.file)} style={{width:"100%",display:"block",background:"#000",maxHeight:480}}
            onError={() => setHasVideo(false)} onClick={togglePlay} playsInline />
        ) : (
          <div className="video-stage-placeholder">
            <PlayIcon size={64} color="#1574C4" />
            <div style={{color:"var(--text-mute)",fontSize:14}}>Video: {v.file}</div>
          </div>
        )}
        <div className="video-controls">
          <button className="video-ctrl-play" onClick={togglePlay}>
            {playing ? "❚❚" : <PlayIcon size={16} />}
          </button>
          <button className="video-ctrl-skip" onClick={() => skip(-10)} title="Rewind 10s">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 1 0 .49-3.5"/></svg>
            <span>10</span>
          </button>
          <button className="video-ctrl-skip" onClick={() => skip(10)} title="Skip 10s">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 1 1-.49-3.5"/></svg>
            <span>10</span>
          </button>
          <div className="video-progress" style={{"--prog": progress}} onClick={seekFromEvent} onMouseDown={handleSeekDrag}>
            <div className="video-progress-fill" style={{width:`${progress*100}%`}} />
          </div>
          <div className="video-time">{currentTime} / {duration}</div>
        </div>
      </div>
      <div className="video-side">
        <div className="video-side-title">{v.title}</div>
        <div className="video-side-meta">
          <Pill variant="primary">{v.category}</Pill>
        </div>
        <div className="video-side-tags">{v.tags.join(" · ")}</div>
        {c && (
          <>
            <div style={{fontSize:14,color:"var(--text-dim)",lineHeight:1.4}}>{c.blurb}</div>
            <button className="ghost-btn" onClick={() => onNavigate({ name: "case-study-detail", id: c.id })}>
              View full case study →
            </button>
          </>
        )}
        <div className="video-side-note">Stored locally on this kiosk · No internet required</div>
      </div>
    </div>
  );
};

// ─── APP ─────────────────────────────────────────────────────────────────────
function App() {
  const [stack, setStack] = useState([{ name: "home" }]);
  const route = stack[stack.length - 1];
  const [showAttract, setShowAttract] = useState(false);
  const lastInteract = useRef(Date.now());
  const IDLE_SEC = 90;

  const navigate = useCallback((r) => {
    setStack(s => [...s, r]);
    setTimeout(() => { const el = document.querySelector(".frame-body"); if (el) el.scrollTop = 0; }, 0);
  }, []);

  const back = useCallback(() => setStack(s => s.length > 1 ? s.slice(0,-1) : s), []);
  const home = useCallback(() => setStack([{ name: "home" }]), []);

  useEffect(() => {
    const handler = () => {
      lastInteract.current = Date.now();
      if (showAttract) setShowAttract(false);
    };
    ["pointerdown","keydown","touchstart"].forEach(ev => document.addEventListener(ev, handler, true));
    const t = setInterval(() => {
      if ((Date.now() - lastInteract.current) / 1000 > IDLE_SEC) {
        // Return to home (not attract screen) when idle
        setStack([{ name: "home" }]);
        lastInteract.current = Date.now();
      }
    }, 1000);
    return () => {
      clearInterval(t);
      ["pointerdown","keydown","touchstart"].forEach(ev => document.removeEventListener(ev, handler, true));
    };
  }, [showAttract]);

  const headerTitle = (() => {
    switch (route.name) {
      case "case-studies": return "Home";
      case "case-study-detail": return "Case Studies";
      case "industries": return "Home";
      case "industry-detail": return "Industries";
      case "capabilities": return "Home";
      case "capability-detail": return "Capabilities";
      case "videos": return "Home";
      case "video-detail": return "Video Library";
      case "numbers": return "Home";
      case "contact": return "Home";
      default: return null;
    }
  })();

  let body;
  switch (route.name) {
    case "home": body = <HomeScreen onNavigate={navigate} />; break;
    case "case-studies": body = <div className="screen-content"><CaseStudiesScreen onNavigate={navigate} filterIndustryId={route.filterIndustryId} filterIndustryName={route.filterIndustryName} /></div>; break;
    case "case-study-detail": body = <div className="screen-content"><CaseStudyDetail id={route.id} onNavigate={navigate} /></div>; break;
    case "industries": body = <div className="screen-content"><IndustriesScreen onNavigate={navigate} /></div>; break;
    case "industry-detail": body = <div className="screen-content"><IndustryDetail id={route.id} onNavigate={navigate} /></div>; break;
    case "capabilities": body = <div className="screen-content"><CapabilitiesScreen onNavigate={navigate} /></div>; break;
    case "capability-detail": body = <div className="screen-content"><CapabilityDetail id={route.id} onNavigate={navigate} /></div>; break;
    case "videos": body = <div className="screen-content"><VideosScreen onNavigate={navigate} /></div>; break;
    case "video-detail": body = <div className="screen-content"><VideoDetail id={route.id} onNavigate={navigate} /></div>; break;
    case "numbers": body = <div className="screen-content"><NumbersScreen /></div>; break;
    case "contact": body = <div className="screen-content"><ContactScreen /></div>; break;
    default: body = <HomeScreen onNavigate={navigate} />;
  }

  return (
    <div className="stage">
      <Frame route={route} onNavigate={(r) => setStack([{ name: "home" }, r])} onBack={back} title={headerTitle}>
        {body}
      </Frame>

      {route.name !== "home" && (
        <button className="home-overlay" onClick={home} aria-label="Home">
          <HomeIcon size={24} />
        </button>
      )}

      {showAttract && (
        <div className="attract" onClick={() => setShowAttract(false)}>
          <div className="attract-bg" />
          <div className="attract-inner">
            <img className="attract-logo" src="Blue SDC Logo.png" alt="SDC Automation" />
            <div className="attract-tagline">Engineering Excellence. Trusted Partnerships.</div>
            <div className="attract-pitch">
              1,500+ custom automation machines built since 1998<br />
              for automotive · life sciences · electronics · aerospace · energy
            </div>
            <div className="attract-touch">
              <div className="touch-pulse" /><div className="touch-pulse touch-pulse-2" />
              <div className="attract-touch-label">— Touch to explore —</div>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
